services:
  db:
    image: postgres:16-alpine
    container_name: course_allocation_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: course_allocation
    # Host port 5433 (not 5432) to avoid clashing with a locally-installed
    # PostgreSQL. Container still listens on 5432 internally.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d course_allocation"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
