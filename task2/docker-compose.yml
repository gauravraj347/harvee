services:
  db:
    image: postgres:16-alpine
    container_name: sql_assistant_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sql_assistant
    # Host port 5434 to avoid clashing with a local PostgreSQL (5432) or Task 1 (5433).
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sql_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
